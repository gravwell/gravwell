# OpenTelemetry Metrics Listener
# Accepts metrics in OTLP format (protobuf or JSON)
# Default URL: /v1/metrics (standard OTLP endpoint)
#[OpenTelemetry-Metrics-Listener "otel-metrics"]
#	URL="/v1/metrics"                # Standard OTLP metrics endpoint
#	Tag-Name="otel-metrics"          # Tag for ingested metrics
#	Ignore-Timestamps=false          # Use timestamps from OTLP data
#	Debug-Posts=true                 # Log debug info about requests
#	Encode-As-JSON=true              # Encode metrics as JSON and include in the entry DATA, (doubles storage requirements)
#	Preprocessor="otel-processor"    # Optional preprocessor
#
# You can add multiple OpenTelemetry listeners on different URLs
#[OpenTelemetry-Metrics-Listener "otel-custom"]
#	URL="/custom/metrics"
#	Tag-Name="otel-custom"
#	Ignore-Timestamps=false
#
# OpenTelemetry Metrics Notes:
# - OpenTelemetry clients should send metrics to http://yourhost:8080/v1/metrics
# - The handler accepts both protobuf and JSON encodings
# - Content-Type header can be:
#   * application/x-protobuf (or application/protobuf)
#   * application/json
# - Metrics are converted to JSON format for storage
# - Resource attributes are attached as enumerated values
# - Supports all OTLP metric types:
#   * Gauge
#   * Sum
#   * Histogram
#   * ExponentialHistogram
#   * Summary
#
# OpenTelemetry Logs Listener
# Accepts logs in OTLP format (protobuf or JSON)
# Default URL: /v1/logs (standard OTLP endpoint)
#[OpenTelemetry-Logs-Listener "otel-logs"]
#	URL="/v1/logs"                   # Standard OTLP logs endpoint
#	Tag-Name="otel-logs"             # Tag for ingested logs
#	Ignore-Timestamps=false          # Use timestamps from OTLP data
#	Debug-Posts=true                 # Log debug info about requests
#	Disable-EVs=false                # Disable enumerated values extraction
#	Preprocessor="otel-processor"    # Optional preprocessor
#
# You can add multiple OpenTelemetry Logs listeners on different URLs
#[OpenTelemetry-Logs-Listener "otel-custom-logs"]
#	URL="/custom/logs"
#	Tag-Name="otel-custom-logs"
#	Ignore-Timestamps=false
#
# OpenTelemetry Logs Notes:
# - OpenTelemetry clients should send logs to http://yourhost:8080/v1/logs
# - The handler accepts both protobuf and JSON encodings
# - Content-Type header can be:
#   * application/x-protobuf (or application/protobuf)
#   * application/json
# - The log body is extracted and stored as entry data
# - Log attributes, severity, trace/span IDs are attached as enumerated values
# - Supports severity levels, trace context, and resource attributes
# - Compatible with OpenTelemetry Collector and SDKs
