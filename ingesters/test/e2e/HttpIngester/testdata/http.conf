[Global]
	Ingest-Secret = "{{ .Ingest_Secret }}"
	Connection-Timeout = 1s
	Insecure-Skip-TLS-Verify=false

	Cleartext-Backend-Target={{ index .Cleartext_Backend_Target 0 }}
    Log-Level=DEBUG
    Bind=":80"
    Log-File=/opt/gravwell/log/http_ingester.log #optional log file
    Health-Check-URL="/health/check"

[Listener "test1"]
	URL="/ingest"
	Tag-Name=http

# Example using basic authentication
[Listener "basicAuthExample"]
	URL="/ingest/auth"
	Tag-Name=http-auth
	AuthType=basic
	Username=username
	Password=password
