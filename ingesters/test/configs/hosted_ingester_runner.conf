[Global]
    #Ingester-UUID="90000000-0000-0000-0000-000000000000" #example UUID, remember to set
	Ingest-Secret = "{{ .Ingest_Secret }}"
	Connection-Timeout = 0
	Insecure-Skip-TLS-Verify=false
	
	Cleartext-Backend-Target={{ index .Cleartext_Backend_Target 0 }} #example of adding a cleartext connection
	#Cleartext-Backend-Target=127.1.0.1:4023 #example of adding another cleartext connection
	#Encrypted-Backend-Target=127.1.1.1:4024 #example of adding an encrypted connection
	#a named pipe connection, this should be used when ingester is on the same machine as a backend
	#Pipe-Backend-Target=/opt/gravwell/comms/pipe

	# always enable the cache for hosted ingesters
	Ingest-Cache-Path=/opt/gravwell/cache/hosted_ingesters.cache
	Max-Ingest-Cache=1024 #Number of MB to store, localcache will only store 1GB before stopping.  This is a safety net

	# log levels and output files
	Log-Level=INFO
	Log-File=/opt/gravwell/log/hosted_ingesters.log

# configure the state file for hosted ingesters
[State]
	Path="/opt/gravwell/etc/hosted_ingesters.state"
	Sync=false #do NOT flush to disk on every sync (sync=true mode can be expensive if disks are slow)

[Tester "test"]
    Interval=5s
