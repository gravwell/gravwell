jobs:
  update-pr-labels:
    name: Update PR Labels
    runs-on: ubuntu-latest
    steps:
      - name: Update PR Labels
        uses: "gravwell/pr-labels@03fa9a6580b7f678d4d09ccb662c17bc6e7fb8d5" # v2.0.0
        with:
          GITHUB_TOKEN: "${{ github.token }}"
name: Update PR Labels
on:
  pull_request_target: {}
  push: {}
permissions:
  contents: read
  pull-requests: write
